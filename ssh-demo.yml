---
- name: Deploy production configuration using OIDC workload identity
  hosts: ssh_target
  gather_facts: false

  tasks:
    - name: Create production directory if it doesn't exist
      ansible.builtin.raw: mkdir -p /home/demo-user/production
      changed_when: false

    - name: Deploy application configuration to production
      ansible.builtin.raw: |
        cat > /home/demo-user/production/app-config.yml << 'EOF'
        # Application Configuration
        environment: production
        database:
          host: db.example.com
          port: 5432
        api:
          endpoint: https://api.example.com
          timeout: 30
        version: 2.1.0
        deployed_at: $(date -Iseconds)
        deployed_by: OIDC Workload Identity
        EOF
      changed_when: true

    - name: Verify deployment
      ansible.builtin.raw: cat /home/demo-user/production/app-config.yml
      register: deployed_config
      changed_when: false

    - name: Display deployed configuration
      ansible.builtin.raw: |
        echo "================================================"
        echo "Deployed configuration file:"
        echo "================================================"
        cat /home/demo-user/production/app-config.yml
        echo ""
        echo "================================================"
      changed_when: false

    - name: Show current user
      ansible.builtin.raw: whoami
      register: current_user
      changed_when: false

    - name: Display deployment summary
      ansible.builtin.raw: |
        echo "================================================"
        echo "Deployment Summary"
        echo "================================================"
        echo "Status: Configuration deployed successfully"
        echo "User: {{ current_user.stdout }}"
        echo "Authentication: Vault (OIDC)"
        echo "================================================"
      changed_when: false
