---
- name: OIDC Workload Identity Demo - SSH with Vault Credentials
  hosts: ssh_target
  gather_facts: false

  tasks:
    - name: Display connection information
      ansible.builtin.raw: echo "Successfully connected to {{ inventory_hostname }} using OIDC credentials from Vault!"
      register: connection_test
      changed_when: false

    - name: Read welcome file using raw command
      ansible.builtin.raw: cat /home/demo-user/welcome.txt
      register: welcome_content
      changed_when: false

    - name: Display welcome message
      ansible.builtin.raw: echo "{{ welcome_content.stdout }}"
      changed_when: false

    - name: Show current user
      ansible.builtin.raw: whoami
      register: current_user
      changed_when: false

    - name: Display final success message
      ansible.builtin.raw: |
        echo "================================================"
        echo "OIDC Workload Identity Demo - SUCCESS!"
        echo "================================================"
        echo "Authenticated as: {{ current_user.stdout }}"
        echo "Using credentials fetched from HashiCorp Vault"
        echo "Zero static credentials - pure workload identity!"
        echo "================================================"
      changed_when: false
